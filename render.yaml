services:
  - type: web
    name: mateu-coffee
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app_final.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: DATABASE_URL
        sync: false          # você preenche no painel do Render
      - key: ANTHROPIC_API_KEY
        sync: false          # você preenche no painel do Render
    autoDeploy: true
