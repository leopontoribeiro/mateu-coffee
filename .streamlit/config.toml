[theme]
base = "dark"
backgroundColor = "#0D0B09"
secondaryBackgroundColor = "#161210"
primaryColor = "#D97732"
textColor = "#F2EBE0"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "viewer"

[server]
headless = true
# Limites de WebSocket e upload (RangeError fix)
maxMessageSize = 200
maxUploadSize = 50
enableXsrfProtection = true

[browser]
gatherUsageStats = false
