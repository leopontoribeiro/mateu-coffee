[theme]
base = "dark"
backgroundColor = "#0A0A0A"
secondaryBackgroundColor = "#141414"
primaryColor = "#E8722E"
textColor = "#F5EDE8"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "viewer"

[server]
headless = true
# Limites de WebSocket e upload (RangeError fix)
maxMessageSize = 200
maxUploadSize = 50
enableXsrfProtection = true

[browser]
gatherUsageStats = false
